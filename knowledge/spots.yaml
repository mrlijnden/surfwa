# surfwa spot knowledge base - hand-maintained local spot rules.
# coast_normal_deg: compass direction the beach faces (land -> sea).
# tide_pref: any | high | mid | low | rising | falling | not_low
# swell_sector: [min_deg, max_deg] waves outside it are blocked/reduced (optional)

